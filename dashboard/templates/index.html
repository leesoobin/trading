<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoTrade Bot Dashboard</title>
<link rel="stylesheet" href="/static/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
<div class="container">
  <!-- Header -->
  <header class="header">
    <h1>🤖 AutoTrade Bot Dashboard</h1>
    <div class="header-right">
      <span id="bot-status" class="status-badge status-running">● RUNNING</span>
      <button id="btn-stop" class="btn btn-danger" onclick="toggleBot()">STOP</button>
    </div>
  </header>

  <!-- Tab Navigation -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')">📊 대시보드</button>
    <button class="tab-btn" data-tab="analyze" onclick="switchTab('analyze')">🔍 종목 분석</button>
  </nav>

  <!-- ══ 대시보드 탭 ══════════════════════════════════════════════ -->
  <div id="tab-dashboard" class="tab-content">
    <!-- Summary Cards -->
    <div class="cards-grid">
      <div class="card">
        <div class="card-label">총 자산</div>
        <div class="card-value" id="total-asset">₩0</div>
      </div>
      <div class="card">
        <div class="card-label">오늘 손익</div>
        <div class="card-value" id="daily-pnl">+₩0</div>
        <div class="card-sub" id="daily-pnl-ratio">+0.00%</div>
      </div>
      <div class="card">
        <div class="card-label">승률</div>
        <div class="card-value" id="win-rate">0%</div>
        <div class="card-sub" id="win-count">0/0</div>
      </div>
      <div class="card">
        <div class="card-label">활성 포지션</div>
        <div class="card-value" id="active-positions">0종목</div>
      </div>
    </div>

    <!-- PnL Chart -->
    <div class="section">
      <h2>누적 손익</h2>
      <div class="chart-container">
        <canvas id="pnl-chart"></canvas>
      </div>
    </div>

    <!-- Positions Table -->
    <div class="section">
      <h2>현재 포지션</h2>
      <div class="table-wrapper">
        <table class="data-table" id="positions-table">
          <thead>
            <tr>
              <th>종목</th><th>거래소</th><th>전략</th><th>진입가</th>
              <th>현재가</th><th>손익</th><th>손절가</th><th>목표가</th>
            </tr>
          </thead>
          <tbody id="positions-body">
            <tr><td colspan="8" class="empty">포지션 없음</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Recent Trades Table -->
    <div class="section">
      <h2>최근 거래 이력</h2>
      <div class="table-wrapper">
        <table class="data-table" id="trades-table">
          <thead>
            <tr>
              <th>시간</th><th>거래소</th><th>종목</th><th>전략</th>
              <th>매수/매도</th><th>가격</th><th>수량</th><th>손익</th><th>차트</th>
            </tr>
          </thead>
          <tbody id="trades-body">
            <tr><td colspan="9" class="empty">거래 내역 없음</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Strategy Stats -->
    <div class="section">
      <h2>전략별 성과</h2>
      <div class="table-wrapper">
        <table class="data-table" id="strategy-table">
          <thead>
            <tr>
              <th>전략</th><th>거래수</th><th>승률</th><th>평균 수익</th><th>누적 손익</th>
            </tr>
          </thead>
          <tbody id="strategy-body">
            <tr><td colspan="5" class="empty">데이터 없음</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div><!-- /tab-dashboard -->

  <!-- ══ 종목 분석 탭 ════════════════════════════════════════════ -->
  <div id="tab-analyze" class="tab-content" style="display:none">
    <div class="section">
      <div class="analyze-form">
        <select id="analyze-market" onchange="updateAnalyzePlaceholder()">
          <option value="overseas">🌐 해외</option>
          <option value="coin">🪙 코인</option>
          <option value="domestic">🇰🇷 국내</option>
        </select>
        <input id="analyze-symbol" type="text" placeholder="AAPL" class="analyze-input"
               onkeydown="if(event.key==='Enter') analyzeSymbol()">
        <select id="analyze-interval">
          <option value="1d">일봉</option>
          <option value="1h">1시간봉</option>
          <option value="15m">15분봉</option>
          <option value="5m">5분봉</option>
          <option value="1m">1분봉</option>
        </select>
        <button id="analyze-btn" class="btn btn-primary" onclick="analyzeSymbol()">분석하기</button>
      </div>
      <div class="analyze-sample">샘플: 코인=KRW-BTC, 국내=005930 또는 삼성전자, 해외=AAPL</div>
      <div id="analyze-loading" style="display:none; margin-top:12px; color:#8892a4; font-size:14px;">
        <span class="loading-spinner"></span> 분석 중...
      </div>
    </div>

    <div id="analyze-result" style="display:none">
      <!-- 캔들 차트 -->
      <div class="section">
        <div id="analyze-chart-header" style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;flex-wrap:wrap;gap:8px">
          <div id="analyze-chart-title" style="color:#e2e8f0;font-weight:600;font-size:15px"></div>
          <div id="analyze-chart-legend" style="font-size:12px;color:#8892a4;display:flex;gap:12px;flex-wrap:wrap"></div>
        </div>
        <div id="candle-chart-container" style="height:340px"></div>
      </div>

      <!-- 현재가 / 기술점수 / 추세 -->
      <div class="section">
        <div class="analyze-info">
          <span>현재가: <b id="res-price">-</b></span>
          <span>기술점수: <b id="res-score">-</b></span>
          <span>추세: <b id="res-trend">-</b></span>
        </div>

        <table class="data-table" style="margin-top:16px">
          <thead><tr><th>전략</th><th>신호</th><th>이유</th></tr></thead>
          <tbody id="signal-body"></tbody>
        </table>
      </div>

      <!-- 매매 추천 -->
      <div class="section">
        <h2>매매 추천</h2>
        <div class="rec-grid" id="rec-box"></div>
      </div>
    </div>

    <div id="analyze-error" style="display:none" class="section">
      <span id="analyze-error-msg" class="negative"></span>
    </div>
  </div><!-- /tab-analyze -->
</div><!-- /container -->

<!-- 거래 차트 모달 -->
<div id="tv-modal" class="modal-overlay" style="display:none" onclick="closeTVModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeTVModal()">✕</button>
    <div id="modal-chart-title" style="color:#e2e8f0;font-weight:600;padding:0 0 12px"></div>
    <div id="modal-chart-legend" style="font-size:12px;color:#8892a4;margin-bottom:8px;display:flex;gap:16px;flex-wrap:wrap"></div>
    <div id="modal-candle-container" style="height:460px"></div>
  </div>
</div>

<script src="/static/js/dashboard.js"></script>
</body>
</html>
